<!DOCTYPE html>
<html lang="en">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="utf-8">
    <title>Notebook</title>
    <link rel="stylesheet" href="/notebook/index.d7b93f81.css">
  </head>
  <body>

    <main>
      <div class="app-buttons">
        <button class="add-notebook">Open Notebook</button>
        <input type="file" class="notebook-input" style="display: none">
        <button class="upload-notebook">Upload</button>
        <button class="open-notebook">Open from Browser</button>
      </div>
      <div class="notebooks">

      </div>
    </main>

    <template class="notebook-template">
      <article class="notebook">
        <h2 class="title" contenteditable="true">Notebook Title</h2>
        <ol class="cells">
        </ol>

        <div class="notebook-buttons"> 
          <button class="add-cell">Add Cell</button>
          <button class="remove-notebook">Close Notebook</button>
          <button class="save-notebook">Download</button>
          <button class="store-notebook">Store In Browser</button>
        </div>
      </article>
    </template>

    <template class="cell-template">
      <section class="cell">
        <div class="input-container"></div>

        <br>
        <output class="console">
        </output>

        <br>

        <output class="output">
        </output>

        <br><br>

        <div class="cell-buttons">
          <button class="run-cell">Run Cell</button>
          <button class="remove-cell">Remove</button>
          <button class="copy-cell">Copy</button>
          <button class="add-cell-below">Add Below</button>
        </div>
      </section>
    </template>

    <script type="module" src="/notebook/index.0f28a237.js"></script>
  </body>
</html>
